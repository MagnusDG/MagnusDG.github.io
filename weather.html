<style>
/* ---------- Base ---------- */
:root{--speed:2s}
html,body,.background{width:100%;height:100%;margin:0;padding:0;font-family:'Lato',sans-serif}
html{background:#fff}
body{background:linear-gradient(0deg,rgba(0,0,200,.2),rgba(0,0,200,0))}
.background{background:linear-gradient(120deg,rgba(50,150,100,.2),rgba(0,0,100,0))}
.container{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0;padding:0;height:100%;width:100%;overflow:auto;position:relative;background:linear-gradient(240deg,rgba(150,50,50,.3),rgba(0,0,200,0))}
nav ul{margin:20px 20px 0 20px;list-style:none;padding:0;display:flex;flex-direction:row;gap:8px}
nav li a{display:block;width:50px;text-align:center;color:#aaa;cursor:pointer}
nav li a:hover{color:#444}
nav li a.active{color:#4444ff}
#card{box-shadow:9px 7px 40px -6px rgba(0,0,0,.25);overflow:hidden;width:300px;height:400px;min-height:300px;margin:20px;border-radius:12px;position:relative}
#card .details{position:absolute;top:0;left:0;right:0;padding:16px 20px;color:#888;display:flex;flex-direction:row;justify-content:space-between;transition:color var(--speed) ease}
#card .details .right{text-align:right}
#date{margin:4px 0}
#summary{font-weight:600;font-size:22px}
.details .temp{font-size:60px;line-height:60px}
.details .temp span{font-size:18px;line-height:30px;vertical-align:top;margin-left:5px}
.weather{background-color:#DAE3FD;transition:background-color var(--speed) ease}
.thunder .weather{background-color:#9FA4AD}
.rain .weather{background-color:#D8D8D8}
.sun .weather{background-color:#ccccff}
.weather #inner{background:linear-gradient(to bottom,rgba(255,255,255,.5) 50%,rgba(255,255,255,0) 100%)}
.cloud{transition:fill var(--speed) ease}
#cloud1{fill:#efefef}.thunder #cloud1{fill:#9FA4AD}
#cloud2{fill:#E6E6E6}.thunder #cloud2{fill:#8B8E98}
#cloud3{fill:#D5D5D5}.thunder #cloud3{fill:#7B7988}
#outer,#back{position:fixed;pointer-events:none}
#location{position:absolute;bottom:10px;left:16px;font-size:12px;color:#666}
#error{position:absolute;bottom:10px;right:16px;font-size:11px;color:#a33;max-width:45%;text-align:right}
</style>
</head>

<script>
// ----------------- Original animation code (trimmed comments) -----------------
var container = $('.container');
var card = $('#card');
var innerSVG = Snap('#inner');
var outerSVG = Snap('#outer');
var backSVG = Snap('#back');
var summary = $('#summary');
var dateEl = $('#date');
var tempEl = $('#temp');
var locEl = $('#location');
var errEl = $('#error');
var weatherContainer1 = Snap.select('#layer1');
var weatherContainer2 = Snap.select('#layer2');
var weatherContainer3 = Snap.select('#layer3');
var innerRainHolder1 = weatherContainer1.group();
var innerRainHolder2 = weatherContainer2.group();
var innerRainHolder3 = weatherContainer3.group();
var innerLeafHolder = weatherContainer1.group();
var innerSnowHolder = weatherContainer1.group();
var innerLightningHolder = weatherContainer1.group();
var leafMask = outerSVG.rect();
var leaf = Snap.select('#leaf');
var sun = Snap.select('#sun');
var sunburst = Snap.select('#sunburst');
var outerSplashHolder = outerSVG.group();
var outerLeafHolder = outerSVG.group();
var outerSnowHolder = outerSVG.group();
var lightningTimeout;
outerLeafHolder.attr({'clip-path': leafMask});
var sizes = {container:{width:0,height:0},card:{width:0,height:0}};
var clouds=[{group:Snap.select('#cloud1')},{group:Snap.select('#cloud2')},{group:Snap.select('#cloud3')}];
var weather=[{type:'snow',name:'Snow'},{type:'wind',name:'Windy'},{type:'rain',name:'Rain'},{type:'thunder',name:'Storms'},{type:'sun',name:'Sunny'}];
var settings={windSpeed:2,rainCount:0,leafCount:0,snowCount:0,cloudHeight:100,cloudSpace:30,cloudArch:50,renewCheck:10,splashBounce:80};
var tickCount=0,rain=[],leafs=[],snow=[];var currentWeather=weather[0];
init();
$(window).resize(onResize);
requestAnimationFrame(tick);
function init(){onResize();for(var i=0;i<weather.length;i++){var w=weather[i];var b=$('#button-'+w.type);w.button=b;b.on('click',w,changeWeather)}for(var i=0;i<clouds.length;i++){clouds[i].offset=Math.random()*sizes.card.width;drawCloud(clouds[i],i)}TweenMax.set(sunburst.node,{opacity:0});changeWeather(weather[4])}
function onResize(){sizes.container.width=container.width();sizes.container.height=container.height();sizes.card.width=card.width();sizes.card.height=card.height();sizes.card.offset=card.offset();innerSVG.attr({width:sizes.card.width,height:sizes.card.height});outerSVG.attr({width:sizes.container.width,height:sizes.container.height});backSVG.attr({width:sizes.container.width,height:sizes.container.height});TweenMax.set(sunburst.node,{transformOrigin:"50% 50%",x:sizes.container.width/2,y:(sizes.card.height/2)+sizes.card.offset.top});TweenMax.fromTo(sunburst.node,20,{rotation:0},{rotation:360,repeat:-1,ease:Power0.easeInOut});leafMask.attr({x:sizes.card.offset.left,y:0,width:sizes.container.width-sizes.card.offset.left,height:sizes.container.height})}
function drawCloud(cloud,i){var space=settings.cloudSpace*i;var height=space+settings.cloudHeight;var arch=height+settings.cloudArch+(Math.random()*settings.cloudArch);var width=sizes.card.width;var points=[];points.push('M'+[-(width),0].join(','));points.push([width,0].join(','));points.push('Q'+[width*2,height/2].join(','));points.push([width,height].join(','));points.push('Q'+[width*.5,arch].join(','));points.push([0,height].join(','));points.push('Q'+[width*-.5,arch].join(','));points.push([-width,height].join(','));points.push('Q'+[-(width*2),height/2].join(','));points.push([-(width),0].join(','));var path=points.join(' ');if(!cloud.path) cloud.path=cloud.group.path();cloud.path.animate({d:path},0)}
function makeRain(){var lineWidth=Math.random()*3;var lineLength=currentWeather.type=='thunder'?35:14;var x=Math.random()*(sizes.card.width-40)+20;var holder=this['innerRainHolder'+(3-Math.floor(lineWidth))];var line=holder.path('M0,0 0,'+lineLength).attr({fill:'none',stroke:currentWeather.type=='thunder'?'#777':'#0000ff',strokeWidth:lineWidth});rain.push(line);TweenMax.fromTo(line.node,1,{x:x,y:0-lineLength},{delay:Math.random(),y:sizes.card.height,ease:Power2.easeIn,onComplete:onRainEnd,onCompleteParams:[line,lineWidth,x,currentWeather.type]})}
function onRainEnd(line,width,x,type){line.remove();for(var i in rain){if(!rain[i].paper) rain.splice(i,1)}if(rain.length<settings.rainCount){makeRain();if(width>2) makeSplash(x,type)}}
function makeSplash(x,type){var splashLength=type=='thunder'?30:20;var splashBounce=type=='thunder'?120:100;var splashDistance=80;var speed=type=='thunder'?0.7:0.5;var splashUp=0-(Math.random()*splashBounce);var randomX=((Math.random()*splashDistance)-(splashDistance/2));var points=[];points.push('M'+0+','+0);points.push('Q'+randomX+','+splashUp);points.push((randomX*2)+','+splashDistance);var splash=outerSplashHolder.path(points.join(' ')).attr({fill:'none',stroke:type=='thunder'?'#777':'#0000ff',strokeWidth:1});var pathLength=Snap.path.getTotalLength(splash);var xOffset=sizes.card.offset.left;var yOffset=sizes.card.offset.top+sizes.card.height;splash.node.style.strokeDasharray=splashLength+' '+pathLength;TweenMax.fromTo(splash.node,speed,{strokeWidth:2,y:yOffset,x:xOffset+20+x,opacity:1,strokeDashoffset:splashLength},{strokeWidth:0,strokeDashoffset:-pathLength,opacity:1,onComplete:onSplashComplete,onCompleteParams:[splash],ease:SlowMo.ease.config(0.4,0.1,false)})}
function onSplashComplete(splash){splash.remove()}
function makeLeaf(){var scale=0.5+(Math.random()*0.5);var newLeaf;var areaY=sizes.card.height/2;var y=areaY+(Math.random()*areaY);var endY=y-((Math.random()*(areaY*2))-areaY);var x;var endX;var colors=['#76993E','#4A5E23','#6D632F'];var color=colors[Math.floor(Math.random()*colors.length)];var xBezier;if(scale>0.8){newLeaf=leaf.clone().appendTo(outerLeafHolder).attr({fill:color});y=y+sizes.card.offset.top/2;endY=endY+sizes.card.offset.top/2;x=sizes.card.offset.left-100;xBezier=x+(sizes.container.width-sizes.card.offset.left)/2;endX=sizes.container.width+50}else{newLeaf=leaf.clone().appendTo(innerLeafHolder).attr({fill:color});x=-100;xBezier=sizes.card.width/2;endX=sizes.card.width+50}leafs.push(newLeaf);var bezier=[{x:x,y:y},{x:xBezier,y:(Math.random()*endY)+(endY/3)},{x:endX,y:endY}];TweenMax.fromTo(newLeaf.node,2,{rotation:Math.random()*180,x:x,y:y,scale:scale},{rotation:Math.random()*360,bezier:bezier,onComplete:onLeafEnd,onCompleteParams:[newLeaf],ease:Power0.easeIn})}
function onLeafEnd(leaf){leaf.remove();for(var i in leafs){if(!leafs[i].paper) leafs.splice(i,1)}if(leafs.length<settings.leafCount){makeLeaf()}}
function makeSnow(){var scale=0.5+(Math.random()*0.5);var newSnow;var x=20+(Math.random()*(sizes.card.width-40));var endY;if(scale>0.8){newSnow=outerSnowHolder.circle(0,0,5).attr({fill:'white'});endY=sizes.container.height+10;x=x+sizes.card.offset.left;var y=sizes.card.offset.top+settings.cloudHeight}else{newSnow=innerSnowHolder.circle(0,0,5).attr({fill:'white'});endY=sizes.card.height+10}snow.push(newSnow);TweenMax.fromTo(newSnow.node,3+(Math.random()*5),{x:x,y:-10},{y:endY,onComplete:onSnowEnd,onCompleteParams:[newSnow],ease:Power0.easeIn});TweenMax.fromTo(newSnow.node,1,{scale:0},{scale:scale,ease:Power1.easeInOut});TweenMax.to(newSnow.node,3,{x:x+((Math.random()*150)-75),repeat:-1,yoyo:true,ease:Power1.easeInOut})}
function onSnowEnd(flake){flake.remove();for(var i in snow){if(!snow[i].paper) snow.splice(i,1)}if(snow.length<settings.snowCount){makeSnow()}}
function tick(){tickCount++;if(tickCount%settings.renewCheck){if(rain.length<settings.rainCount) makeRain();if(leafs.length<settings.leafCount) makeLeaf();if(snow.length<settings.snowCount) makeSnow()}for(var i=0;i<clouds.length;i++){if(currentWeather.type=='sun'){if(clouds[i].offset>-(sizes.card.width*1.5)) clouds[i].offset+=settings.windSpeed/(i+1);if(clouds[i].offset>sizes.card.width*2.5) clouds[i].offset=-(sizes.card.width*1.5);clouds[i].group.transform('t'+clouds[i].offset+','+0)}else{clouds[i].offset+=settings.windSpeed/(i+1);if(clouds[i].offset>sizes.card.width) clouds[i].offset=0+(clouds[i].offset-sizes.card.width);clouds[i].group.transform('t'+clouds[i].offset+','+0)}}requestAnimationFrame(tick)}
function reset(){for(var i=0;i<weather.length;i++){container.removeClass(weather[i].type);weather[i].button.removeClass('active')}}
function updateSummaryText(txt){summary.text(txt||currentWeather.name);TweenMax.fromTo(summary,1.2,{x:30},{opacity:1,x:0,ease:Power4.easeOut})}
function startLightningTimer(){if(lightningTimeout) clearTimeout(lightningTimeout);if(currentWeather.type=='thunder'){lightningTimeout=setTimeout(lightning,Math.random()*6000)}}
function lightning(){startLightningTimer();TweenMax.fromTo(card,0.75,{y:-30},{y:0,ease:Elastic.easeOut});var pathX=30+Math.random()*(sizes.card.width-60);var steps=20;var points=[pathX+',0'];for(var i=0;i<steps;i++){var x=pathX+(Math.random()*20-10);var y=(sizes.card.height/steps)*(i+1);points.push(x+','+y)}var strike=weatherContainer1.path('M'+points.join(' ')).attr({fill:'none',stroke:'white',strokeWidth:2+Math.random()});TweenMax.to(strike.node,1,{opacity:0,ease:Power4.easeOut,onComplete:function(){strike.remove()}})}
function changeWeather(w){if(w.data) w=w.data;reset();currentWeather=w;TweenMax.killTweensOf(summary);TweenMax.to(summary,1,{opacity:0,x:-30,onComplete:function(){updateSummaryText()},ease:Power4.easeIn});container.addClass(w.type);w.button.addClass('active');switch(w.type){case 'wind':TweenMax.to(settings,3,{windSpeed:3,ease:Power2.easeInOut});break;case 'sun':TweenMax.to(settings,3,{windSpeed:20,ease:Power2.easeInOut});break;default:TweenMax.to(settings,3,{windSpeed:.5,ease:Power2.easeOut});break}switch(w.type){case 'rain':TweenMax.to(settings,3,{rainCount:10,ease:Power2.easeInOut});break;case 'thunder':TweenMax.to(settings,3,{rainCount:60,ease:Power2.easeInOut});break;default:TweenMax.to(settings,1,{rainCount:0,ease:Power2.easeOut});break}switch(w.type){case 'wind':TweenMax.to(settings,3,{leafCount:5,ease:Power2.easeInOut});break;default:TweenMax.to(settings,1,{leafCount:0,ease:Power2.easeOut});break}switch(w.type){case 'snow':TweenMax.to(settings,3,{snowCount:40,ease:Power2.easeInOut});break;default:TweenMax.to(settings,1,{snowCount:0,ease:Power2.easeOut});break}switch(w.type){case 'sun':TweenMax.to(sun.node,4,{x:sizes.card.width/2,y:sizes.card.height/2,ease:Power2.easeInOut});TweenMax.to(sunburst.node,4,{scale:1,opacity:.8,y:(sizes.card.height/2)+(sizes.card.offset.top),ease:Power2.easeInOut});break;default:TweenMax.to(sun.node,2,{x:sizes.card.width/2,y:-100,ease:Power2.easeInOut});TweenMax.to(sunburst.node,2,{scale:.4,opacity:0,y:(sizes.container.height/2)-50,ease:Power2.easeInOut});break}startLightningTimer()}

// ----------------- Open‑Meteo integration -----------------
const chiayi = { lat: 23.4801, lon: 120.4491, label: 'Chiayi, Taiwan' };
const apiBase = 'https://api.open-meteo.com/v1/forecast';
const geocodeBase = 'https://geocoding-api.open-meteo.com/v1/reverse';
const currentFields = 'temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m';

const WMO_MAP = new Map([
  // Weather code -> [type, label]
  [0, ['sun','Clear']],
  [1, ['sun','Mainly clear']],
  [2, ['sun','Partly cloudy']],
  [3, ['sun','Overcast']],
  [45, ['sun','Fog']],
  [48, ['sun','Depositing rime fog']],
  [51, ['rain','Light drizzle']],
  [53, ['rain','Drizzle']],
  [55, ['rain','Dense drizzle']],
  [56, ['rain','Freezing drizzle']],
  [57, ['rain','Freezing drizzle']],
  [61, ['rain','Slight rain']],
  [63, ['rain','Rain']],
  [65, ['rain','Heavy rain']],
  [66, ['rain','Freezing rain']],
  [67, ['rain','Heavy freezing rain']],
  [71, ['snow','Slight snow']],
  [73, ['snow','Snow']],
  [75, ['snow','Heavy snow']],
  [77, ['snow','Snow grains']],
  [80, ['rain','Rain showers']],
  [81, ['rain','Rain showers']],
  [82, ['rain','Violent rain showers']],
  [85, ['snow','Snow showers']],
  [86, ['snow','Heavy snow showers']],
  [95, ['thunder','Thunderstorm']],
  [96, ['thunder','Thunderstorm with hail']],
  [97, ['thunder','Thunderstorm with heavy hail']],
  [99, ['thunder','Severe thunderstorm']]
]);

async function fetchJSON(url, opts={}){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), 12000);
  try{const res = await fetch(url,{...opts,signal:ctrl.signal});if(!res.ok) throw new Error('HTTP '+res.status);return await res.json()}finally{clearTimeout(t)}
}

function wmoToTypeLabel(code){
  const entry = WMO_MAP.get(code) || ['sun','Unknown'];
  return { type: entry[0], label: entry[1] };
}

function setDate(ts){
  const d = ts ? new Date(ts) : new Date();
  const fmt = d.toLocaleString(undefined,{ weekday:'long', day:'2-digit', month:'long', hour:'2-digit', minute:'2-digit' });
  dateEl.text(fmt);
}

async function reverseGeocode(lat,lon){
  try{
    const url = `${geocodeBase}?latitude=${lat}&longitude=${lon}&language=en&format=json`;
    const j = await fetchJSON(url);
    const r = j && j.results && j.results[0];
    if(!r) return `${lat.toFixed(3)}, ${lon.toFixed(3)}`;
    const parts = [r.name, r.admin1, r.country].filter(Boolean);
    return parts.join(', ');
  }catch(e){
    return `${lat.toFixed(3)}, ${lon.toFixed(3)}`;
  }
}

async function updateFromOpenMeteo(lat, lon){
  errEl.text('');
  const url = `${apiBase}?latitude=${lat}&longitude=${lon}&current=${currentFields}&timezone=auto`;
  try{
    const data = await fetchJSON(url);
    const cur = data.current || {};
    const temp = cur.temperature_2m;
    const wcode = cur.weather_code;
    const wind = cur.wind_speed_10m;
    const { type, label } = wmoToTypeLabel(wcode);

    // If wind is strong and not thunder, surface as wind
    const finalType = (type!=='thunder' && wind>=8) ? 'wind' : type;

    // Drive animation state
    const w = weather.find(x=>x.type===finalType) || weather[4];
    changeWeather(w);

    // UI
    tempEl.html(`${Math.round(temp)}<span>°C</span>`);
    updateSummaryText(label);
    setDate(cur.time);

    const nice = await reverseGeocode(lat,lon);
    locEl.text(nice);
  }catch(err){
    console.error(err);
    errEl.text('Open‑Meteo error. Using fallback.');
    // fallback: leave previous state
  }
}

function locateAndLoad(){
  setDate();
  if(navigator.geolocation){
    const opts = { enableHighAccuracy:true, timeout:8000, maximumAge:300000 };
    navigator.geolocation.getCurrentPosition(async pos=>{
      const { latitude:lat, longitude:lon } = pos.coords;
      await updateFromOpenMeteo(lat,lon);
    }, async _err=>{
      locEl.text(chiayi.label+' (fallback)');
      await updateFromOpenMeteo(chiayi.lat,chiayi.lon);
    }, opts);
  }else{
    locEl.text(chiayi.label+' (fallback)');
    updateFromOpenMeteo(chiayi.lat,chiayi.lon);
  }
}

// Pull new data every 5 minutes
let refreshTimer = null;
function startAutoRefresh(){
  if(refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(()=>{
    // Read last lat/lon from label if possible; otherwise use Chiayi
    const t = locEl.text();
    if(/\((?:fallback)\)/i.test(t)){
      updateFromOpenMeteo(chiayi.lat,chiayi.lon);
    }else{
      // no stored coords here; just trigger geolocation again
      locateAndLoad();
    }
  }, 300000);
}

// Boot
locateAndLoad();
startAutoRefresh();
</script>
