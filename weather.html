<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Realtime Weather Card • Open‑Meteo</title>
  <!-- Fonts and Icons -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.9/css/weather-icons.min.css" rel="stylesheet" />

  <style>
  :root { --speed: 2s; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  html { background: #000000; }
  body { margin: 0; font-family: 'Lato', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }

  .background, .container { width: 100%; height: 100%; }
  .background { background: linear-gradient(120deg, rgba(205,105,155,.2), rgba(255,255,155,0)); }

  .container {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0; padding: 0; overflow: auto; position: relative;
    #background: linear-gradient(240deg, rgba(105,205,205,.3), rgba(255,255,55,0));
    #transition: background-color var(--speed) ease;
    background: transparent;
  }

  nav ul { margin: 20px; padding: 0; list-style: none; display: flex; gap: 8px; }
  nav li a { display: block; width: 50px; text-align: center; color: #777777; cursor: pointer; text-decoration: none; }
  nav li a:hover { color: #BBBBBB; }
  nav li a.active { color: #BBBB00; }

  #card { box-shadow: 9px 7px 40px -6px rgba(255,255,255,.25); width: 320px; height: 420px; min-height: 300px; margin: 20px; border-radius: 8px; position: relative; overflow: hidden; }

  /* Weather theme backgrounds */
  .weather { background-color: #251C02; transition: background-color var(--speed) ease; }
  .thunder .weather { background-color: #605B52; }
  .rain .weather { background-color: #272727; }
  .sun .weather { background-color: #333311; }

  #inner { background: linear-gradient(to bottom, rgba(0,0,0,.5) 50%, rgba(0,0,0,0) 100%); }

  /* Clouds tint per theme */
  .cloud { transition: fill var(--speed) ease; }
  #cloud1 { fill: #101010; }
  .thunder #cloud1 { fill: #605B52; }
  #cloud2 { fill: #191919; }
  .thunder #cloud2 { fill: #747167; }
  #cloud3 { fill: #2A2A2A; }
  .thunder #cloud3 { fill: #848677; }

  /* Details overlay */
  .details { position: absolute; inset: 0 auto auto 0; right: 0; padding: 16px 20px; color: #999999; display: flex; justify-content: space-between; gap: 12px; }
  .thunder .details { color: #222222; }
  .right { text-align: right; }
  .temp { font-size: 60px; line-height: 60px; }
  .temp span { font-size: 18px; line-height: 30px; vertical-align: top; margin-left: 5px; }
  #date { margin: 4px 0; font-size: 14px; color: #888888; }
  #summary { font-weight: 700; font-size: 20px; color: #CCCCCC; }

  /* Fixed SVG layers */
  #outer, #back { position: fixed; inset: 0; pointer-events: none; }

  /* Footer status */
  .status { font-size: 12px; color: #999999; margin-bottom: 8px; opacity: .85; }

  /* Location label */
  #place { font-weight: 700; font-size: 14px; color: #DDDDDD; }

  /* Details panel + toggle */
  #toggle-details{ position:absolute; right:12px; bottom:12px; width:40px; height:40px; border:none; border-radius:20px; background:#000000; box-shadow:0 6px 16px rgba(255,255,255,.2); cursor:pointer; display:grid; place-items:center; transition:transform .25s ease, background .25s ease; }
  .thunder #toggle-details{ background:#161616; }
  #toggle-details svg{ width:18px; height:18px; }
  .panel{ position:absolute; inset:0; background:rgba(0,0,0,.96); backdrop-filter:saturate(1.2) blur(2px); transform:translateY(100%); transition:transform .35s ease; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .panel.open{ transform:translateY(0); }
  .panel h3{ margin:0; font-size:16px; font-weight:700; color:#DDDDDD; }
  .panel .meta{ font-size:12px; color:#999999; }
  .panel .grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
  .kv{ background:#0A0800; border-radius:8px; padding:10px; }
  .kv h4{ margin:0 0 6px 0; font-size:12px; color:#BBBBAA; font-weight:700; }
  .kv .v{ font-size:18px; font-weight:700; color:#DDDDCC; }
  .hours{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .hour{ background:#080808; border-radius:8px; padding:8px; text-align:center; font-size:12px; }
  .hour .t{ font-weight:700; font-size:14px; }
</style>

</head>
<body>
  <div class="background">
    <div class="container">
      <svg id="back">
        <defs>
          <radialGradient id="SVGID_1_" cx="0" cy="0" r="320.8304" gradientUnits="userSpaceOnUse">
            <stop offset="0" style="stop-color:#FFDE17;stop-opacity:0.7"/>
            <stop offset="1" style="stop-color:#FFF200;stop-opacity:0"/>
          </radialGradient>
        </defs>
        <path id="sunburst" style="fill:url(#SVGID_1_);" d="M0,319.7c-18.6,0-37.3-1.6-55.5-4.8L-7.8,41.4c5.1,0.9,10.6,0.9,15.7,0L56,314.8C37.6,318,18.8,319.7,0,319.7z M-160.8,276.6c-32.5-18.8-61.3-42.9-85.5-71.6L-34,26.2c3.4,4.1,7.4,7.4,12,10.1L-160.8,276.6z M161.3,276.4L22.1,36.2 c4.5-2.6,8.6-6,12-10.1l212.6,178.5C222.5,233.4,193.8,257.6,161.3,276.4z M-302.5,108.3C-315.4,73-321.9,36-322-1.8l277.6-0.5 c0,5.3,0.9,10.4,2.7,15.2L-302.5,108.3z M302.6,107.8L41.8,12.8c1.7-4.7,2.6-9.7,2.6-14.9c0-0.3,0-0.6,0-1H322l0-1.3l0,1.9 C322,35.4,315.5,72.5,302.6,107.8z M-41.8-17.5l-261-94.5c12.8-35.4,31.6-68,55.8-96.9L-34.1-30.8C-37.5-26.8-40.1-22.3-41.8-17.5z M41.7-17.7c-1.8-4.8-4.4-9.3-7.8-13.3l212-179.2c24.3,28.8,43.3,61.3,56.3,96.6L41.7-17.7z M-22.2-40.8l-139.6-240 c32.7-19,68.1-32,105.2-38.6L-8-46.1C-13-45.2-17.8-43.4-22.2-40.8z M22-40.9c-4.4-2.6-9.2-4.3-14.2-5.1l47.1-273.6 c37.2,6.4,72.7,19.2,105.4,38L22-40.9z"/>
      </svg>

      <!-- <div class="status" id="status">Loading…</div> -->

      <nav>
        <ul>
          <li><a id="button-snow" class="active" title="Snow"><i class="wi wi-snow"></i></a></li>
          <li><a id="button-wind" title="Wind"><i class="wi wi-strong-wind"></i></a></li>
          <li><a id="button-rain" title="Rain"><i class="wi wi-rain"></i></a></li>
          <li><a id="button-thunder" title="Thunder"><i class="wi wi-lightning"></i></a></li>
          <li><a id="button-sun" title="Sun"><i class="wi wi-day-sunny"></i></a></li>
        </ul>
      </nav>

      <div id="card" class="weather">
        <svg id="inner"></svg>
        <div class="details">
          <div class="temp" id="temp">--<span>°C</span></div>
          <div class="right">
            <div id="place">—</div>
            <div id="date">—</div>
            <div id="summary"></div>
          </div>
        </div>
        <button id="toggle-details" aria-label="Details">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 4l8 8-8 8"/></svg>
        </button>
        <div id="panel" class="panel" aria-hidden="true">
          <button id="panel-back" aria-label="Back" style="position:absolute;top:10px;right:10px;width:36px;height:36px;border:none;border-radius:18px;background:#fff;box-shadow:0 4px 10px rgba(0,0,0,.2);display:grid;place-items:center;cursor:pointer;z-index:1;"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4l-8 8 8 8"/></svg></button>
          <h3 id="panel-place">—</h3>
          <div class="meta" id="panel-date">—</div>
          <div class="grid">
            <div class="kv"><h4>Condition</h4><div class="v" id="kv-cond">—</div></div>
            <div class="kv"><h4>Temperature</h4><div class="v" id="kv-temp">—</div></div>
            <div class="kv"><h4>Wind</h4><div class="v" id="kv-wind">—</div></div>
            <div class="kv"><h4>Humidity</h4><div class="v" id="kv-hum">—</div></div>
          </div>
          <h3>Next hours</h3>
          <div class="hours" id="hours"></div>
        </div>
      </div>
      <svg id="outer"></svg>
    </div>
  </div>

  <!-- Libraries -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/snap.svg/0.5.1/snap.svg-min.js"></script>

  <script>
    
    // ===== DOM refs and SVG layers =====
    var container = $('.container');
    var card = $('#card');
    var innerSVG = Snap('#inner');
    var outerSVG = Snap('#outer');
    var backSVG = Snap('#back');
    var summary = $('#summary');
    var dateEl = $('#date');
    var statusEl = $('#status');

    var weatherContainer1 = innerSVG.group();
    var weatherContainer2 = innerSVG.group();
    var weatherContainer3 = innerSVG.group();
    weatherContainer1.attr({ id: 'layer1' });
    weatherContainer2.attr({ id: 'layer2' });
    weatherContainer3.attr({ id: 'layer3' });

    var innerRainHolder1 = weatherContainer1.group();
    var innerRainHolder2 = weatherContainer2.group();
    var innerRainHolder3 = weatherContainer3.group();
    var innerLeafHolder = weatherContainer1.group();
    var innerSnowHolder = weatherContainer1.group();
    var innerLightningHolder = weatherContainer1.group();

    var outerSplashHolder = outerSVG.group();
    var outerLeafHolder = outerSVG.group();
    var outerSnowHolder = outerSVG.group();
    var leafMask = outerSVG.rect();
    outerLeafHolder.attr({ 'clip-path': leafMask });

    // Leaf and Sun assets
    var leafPath = innerSVG.path('M41.9,56.3l0.1-2.5c0,0,4.6-1.2,5.6-2.2c1-1,3.6-13,12-15.6c9.7-3.1,19.9-2,26.1-2.1c2.7,0-10,23.9-20.5,25 c-7.5,0.8-17.2-5.1-17.2-5.1L41.9,56.3z');
    leafPath.attr({ id: 'leaf', opacity: 0 }); // template only
    var leaf = leafPath;

    var sun = innerSVG.circle(0, 0, 50).attr({ id: 'sun', fill: '#F7ED47' });
    var sunburst = Snap.select('#sunburst');

    var sizes = { container: { w: 0, h: 0 }, card: { w: 0, h: 0, offset: { left: 0, top: 0 } } };

    var clouds = [ { group: innerSVG.group().attr({ id: 'cloud1' }) }, { group: innerSVG.group().attr({ id: 'cloud2' }) }, { group: innerSVG.group().attr({ id: 'cloud3' }) } ];

    var weather = [
      { type: 'snow', name: 'Snow'},
      { type: 'wind', name: 'Windy'},
      { type: 'rain', name: 'Rain'},
      { type: 'thunder', name: 'Storms'},
      { type: 'sun', name: 'Sunny'}
    ];

    var settings = { windSpeed: 2, rainCount: 0, leafCount: 0, snowCount: 0, cloudHeight: 100, cloudSpace: 30, cloudArch: 50, renewCheck: 10, splashBounce: 80 };

    var currentWeather = weather[0];
    var tickCount = 0; var rain = []; var leafs = []; var snow = [];
    var lightningTimeout;

    // ===== Layout sizing =====
    function onResize() {
      sizes.container.w = container.width();
      sizes.container.h = container.height();
      sizes.card.w = card.width();
      sizes.card.h = card.height();
      sizes.card.offset = card.offset();

      innerSVG.attr({ width: sizes.card.w, height: sizes.card.h });
      outerSVG.attr({ width: sizes.container.w, height: sizes.container.h });
      backSVG.attr({ width: sizes.container.w, height: sizes.container.h });

      TweenMax.set(sunburst.node, { transformOrigin: '50% 50%', x: sizes.container.w / 2, y: (sizes.card.h/2) + sizes.card.offset.top });
      TweenMax.fromTo(sunburst.node, 20, { rotation: 0 }, { rotation: 360, repeat: -1, ease: Power0.easeInOut });

      leafMask.attr({ x: sizes.card.offset.left, y: 0, width: sizes.container.w - sizes.card.offset.left, height: sizes.container.h });
    }

    function drawCloud(cloud, idx) {
      var space = settings.cloudSpace * idx;
      var height = space + settings.cloudHeight;
      var arch = height + settings.cloudArch + (Math.random() * settings.cloudArch);
      var width = sizes.card.w;

      var p = [];
      p.push('M' + (-(width)) + ',0');
      p.push(width + ',0');
      p.push('Q' + (width * 2) + ',' + (height/2));
      p.push(width + ',' + height);
      p.push('Q' + (width * 0.5) + ',' + arch);
      p.push('0,' + height);
      p.push('Q' + (width * -0.5) + ',' + arch);
      p.push(-width + ',' + height);
      p.push('Q' + (-(width * 2)) + ',' + (height/2));
      p.push(-(width) + ',0');

      var d = p.join(' ');
      if (!cloud.path) cloud.path = cloud.group.path();
      cloud.path.animate({ d }, 0);
    }

    // ===== Visual particles =====
    function makeRain() {
      var lineWidth = Math.random() * 3;
      var lineLength = currentWeather.type === 'thunder' ? 35 : 14;
      var x = Math.random() * (sizes.card.w - 40) + 20;
      var holder = (3 - Math.floor(lineWidth));
      var line = (holder === 1 ? innerRainHolder1 : holder === 2 ? innerRainHolder2 : innerRainHolder3)
        .path('M0,0 0,' + lineLength)
        .attr({ fill: 'none', stroke: currentWeather.type === 'thunder' ? '#777' : '#00f', strokeWidth: lineWidth });

      rain.push(line);
      TweenMax.fromTo(line.node, 1, { x, y: 0 - lineLength }, { delay: Math.random(), y: sizes.card.h, ease: Power2.easeIn, onComplete: onRainEnd, onCompleteParams: [line, lineWidth, x, currentWeather.type] });
    }
    function onRainEnd(line, width, x, type) {
      line.remove();
      for (var i = rain.length - 1; i >= 0; i--) if (!rain[i].paper) rain.splice(i, 1);
      if (rain.length < settings.rainCount) {
        makeRain();
        if (width > 2) makeSplash(x, type);
      }
    }
    function makeSplash(x, type) {
      var splashLength = type === 'thunder' ? 30 : 20;
      var splashBounce = type === 'thunder' ? 120 : 100;
      var splashDistance = 80;
      var speed = type === 'thunder' ? 0.7 : 0.5;
      var splashUp = 0 - (Math.random() * splashBounce);
      var randomX = ((Math.random() * splashDistance) - (splashDistance / 2));
      var points = ['M0,0', 'Q' + randomX + ',' + splashUp, (randomX * 2) + ',' + splashDistance];
      var splash = outerSplashHolder.path(points.join(' ')).attr({ fill: 'none', stroke: type === 'thunder' ? '#777' : '#00f', strokeWidth: 1 });
      var pathLength = Snap.path.getTotalLength(splash);
      var xOffset = sizes.card.offset.left;
      var yOffset = sizes.card.offset.top + sizes.card.h;
      splash.node.style.strokeDasharray = splashLength + ' ' + pathLength;
      TweenMax.fromTo(splash.node, speed, { strokeWidth: 2, y: yOffset, x: xOffset + 20 + x, opacity: 1, strokeDashoffset: splashLength }, { strokeWidth: 0, strokeDashoffset: -pathLength, opacity: 1, onComplete: function(){ splash.remove(); }, ease: SlowMo.ease.config(0.4, 0.1, false) });
    }

    function makeLeaf() {
      var scale = 0.5 + (Math.random() * 0.5);
      var areaY = sizes.card.h / 2;
      var y = areaY + (Math.random() * areaY);
      var endY = y - ((Math.random() * (areaY * 2)) - areaY);
      var x, endX, xBezier;
      var colors = ['#76993E', '#4A5E23', '#6D632F'];
      var color = colors[Math.floor(Math.random() * colors.length)];
      var newLeaf;

      if (scale > 0.8) {
        newLeaf = leaf.clone().appendTo(outerLeafHolder).attr({ fill: color, opacity: 1 });
        y = y + sizes.card.offset.top / 2;
        endY = endY + sizes.card.offset.top / 2;
        x = sizes.card.offset.left - 100;
        xBezier = x + (sizes.container.w - sizes.card.offset.left) / 2;
        endX = sizes.container.w + 50;
      } else {
        newLeaf = leaf.clone().appendTo(innerLeafHolder).attr({ fill: color, opacity: 1 });
        x = -100; xBezier = sizes.card.w / 2; endX = sizes.card.w + 50;
      }

      leafs.push(newLeaf);
      var bezier = [{ x, y }, { x: xBezier, y: (Math.random() * endY) + (endY / 3) }, { x: endX, y: endY }];
      TweenMax.fromTo(newLeaf.node, 2, { rotation: Math.random()*180, x, y, scale }, { rotation: Math.random()*360, bezier, onComplete: function(){
        newLeaf.remove();
        for (var i = leafs.length - 1; i >= 0; i--) if (!leafs[i].paper) leafs.splice(i, 1);
        if (leafs.length < settings.leafCount) makeLeaf();
      }, ease: Power0.easeIn });
    }

    function makeSnow() {
      var scale = 0.5 + (Math.random() * 0.5);
      var x = 20 + (Math.random() * (sizes.card.w - 40));
      var y = -10; var endY;
      var newSnow;
      if (scale > 0.8) {
        newSnow = outerSnowHolder.circle(0,0,5).attr({ fill: 'white' });
        endY = sizes.container.h + 10; y = sizes.card.offset.top + settings.cloudHeight; x = x + sizes.card.offset.left;
      } else {
        newSnow = innerSnowHolder.circle(0,0,5).attr({ fill: 'white' });
        endY = sizes.card.h + 10;
      }
      snow.push(newSnow);
      TweenMax.fromTo(newSnow.node, 3 + (Math.random()*5), { x, y }, { y: endY, onComplete: function(){
        newSnow.remove();
        for (var i = snow.length - 1; i >= 0; i--) if (!snow[i].paper) snow.splice(i, 1);
        if (snow.length < settings.snowCount) makeSnow();
      }, ease: Power0.easeIn });
      TweenMax.fromTo(newSnow.node, 1, { scale: 0 }, { scale, ease: Power1.easeInOut });
      TweenMax.to(newSnow.node, 3, { x: x + ((Math.random()*150)-75), repeat: -1, yoyo: true, ease: Power1.easeInOut });
    }

    function tick() {
      tickCount++;
      if (tickCount % settings.renewCheck) {
        if (rain.length < settings.rainCount) makeRain();
        if (leafs.length < settings.leafCount) makeLeaf();
        if (snow.length < settings.snowCount) makeSnow();
      }
      for (var i = 0; i < clouds.length; i++) {
        if (currentWeather.type === 'sun') {
          if (clouds[i].offset > -(sizes.card.w * 1.5)) clouds[i].offset += settings.windSpeed / (i+1);
          if (clouds[i].offset > sizes.card.w * 2.5) clouds[i].offset = -(sizes.card.w * 1.5);
        } else {
          clouds[i].offset += settings.windSpeed / (i+1);
          if (clouds[i].offset > sizes.card.w) clouds[i].offset = clouds[i].offset - sizes.card.w;
        }
        clouds[i].group.transform('t' + clouds[i].offset + ',0');
      }
      requestAnimationFrame(tick);
    }

    function resetTheme() {
      ['snow','wind','rain','thunder','sun'].forEach(function(t){ container.removeClass(t); $('#button-'+t).removeClass('active'); });
    }
    function applyTheme(weatherObj) {
      resetTheme(); currentWeather = weatherObj; container.addClass(weatherObj.type); $('#button-'+weatherObj.type).addClass('active');
      TweenMax.killTweensOf(summary);
      TweenMax.to(summary, 1, { opacity: 0, x: -30, onComplete: function(){ summary.text(weatherObj.name); TweenMax.fromTo(summary, 1.2, { x: 30 }, { opacity: 1, x: 0, ease: Power4.easeOut }); }, ease: Power4.easeIn });
      switch(weatherObj.type){
        case 'wind': TweenMax.to(settings, 3, { windSpeed: 3, ease: Power2.easeInOut }); break;
        case 'sun': TweenMax.to(settings, 3, { windSpeed: 20, ease: Power2.easeInOut }); break;
        default: TweenMax.to(settings, 3, { windSpeed: 0.5, ease: Power2.easeOut });
      }
      switch(weatherObj.type){
        case 'rain': TweenMax.to(settings, 3, { rainCount: 10, ease: Power2.easeInOut }); break;
        case 'thunder': TweenMax.to(settings, 3, { rainCount: 60, ease: Power2.easeInOut }); break;
        default: TweenMax.to(settings, 1, { rainCount: 0, ease: Power2.easeOut });
      }
      switch(weatherObj.type){
        case 'wind': TweenMax.to(settings, 3, { leafCount: 5, ease: Power2.easeInOut }); break;
        default: TweenMax.to(settings, 1, { leafCount: 0, ease: Power2.easeOut });
      }
      switch(weatherObj.type){
        case 'snow': TweenMax.to(settings, 3, { snowCount: 40, ease: Power2.easeInOut }); break;
        default: TweenMax.to(settings, 1, { snowCount: 0, ease: Power2.easeOut });
      }
      switch(weatherObj.type){
        case 'sun':
          TweenMax.to(sun.node, 4, { x: sizes.card.w/2, y: sizes.card.h/2, ease: Power2.easeInOut });
          TweenMax.to(sunburst.node, 4, { scale: 1, opacity: .8, y: (sizes.card.h/2) + sizes.card.offset.top, ease: Power2.easeInOut });
          break;
        default:
          TweenMax.to(sun.node, 2, { x: sizes.card.w/2, y: -100, ease: Power2.easeInOut });
          TweenMax.to(sunburst.node, 2, { scale: .4, opacity: 0, y: (sizes.container.h/2)-50, ease: Power2.easeInOut });
      }
      startLightningTimer();
    }

    function startLightningTimer(){ if (lightningTimeout) clearTimeout(lightningTimeout); if (currentWeather.type === 'thunder') lightningTimeout = setTimeout(lightning, Math.random()*6000); }
    function lightning(){ startLightningTimer(); TweenMax.fromTo(card, .75, { y: -30 }, { y: 0, ease: Elastic.easeOut }); var pathX = 30 + Math.random() * (sizes.card.w - 60); var steps = 20; var pts=[pathX + ',0']; for (var i=0; i<steps; i++){ var x = pathX + (Math.random()*20 - 10); var y = (sizes.card.h/steps)*(i+1); pts.push(x+','+y);} var strike = weatherContainer1.path('M'+pts.join(' ')).attr({ fill:'none', stroke:'#fff', strokeWidth: 2 + Math.random() }); TweenMax.to(strike.node, 1, { opacity: 0, ease: Power4.easeOut, onComplete: function(){ strike.remove(); }}); }

    // Extra DOM for details panel
    var placeEl = $('#place');
    var panel = $('#panel');
    var toggleBtn = $('#toggle-details');
    var panelPlace = $('#panel-place');
    var panelDate = $('#panel-date');
    var kvCond = $('#kv-cond');
    var kvTemp = $('#kv-temp');
    var kvWind = $('#kv-wind');
    var kvHum = $('#kv-hum');
    var hoursEl = $('#hours');
    var lastCoordsName = null;

    // ===== Open‑Meteo integration =====
    const OM_GEOCODE = 'https://geocoding-api.open-meteo.com/v1/search?name={q}&count=10&language=en&format=json';
    const OM_FORECAST = 'https://api.open-meteo.com/v1/forecast?latitude={lat}&longitude={lon}&current=temperature_2m,wind_speed_10m,weather_code,precipitation&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m&timezone=auto';

    async function geocodeByName(name){
      try {
        const url = OM_GEOCODE.replace('{q}', encodeURIComponent(name));
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('geocode http '+res.status);
        const data = await res.json();
        if (data && data.results && data.results.length) return { lat: data.results[0].latitude, lon: data.results[0].longitude, name: data.results[0].name };
      } catch(e) { console.warn('geocode error', e); }
      return null;
    }

    function mapWMOToTheme(code, wind){
      if (code === 0) return 'sun';
      if ([1,2,3].includes(code)) return wind >= 8 ? 'wind' : 'sun';
      if ([45,48].includes(code)) return 'rain';
      if ([51,53,55,56,57,61,63,65,66,67,80,81,82].includes(code)) return 'rain';
      if ([71,73,75,77,85,86].includes(code)) return 'snow';
      if ([95,96,99].includes(code)) return 'thunder';
      return wind >= 8 ? 'wind' : 'sun';
    }

    function themeToObject(theme){
      return weather.find(w => w.type === theme) || weather[4];
    }

    async function fetchForecast(lat, lon){
      const url = OM_FORECAST.replace('{lat}', String(lat)).replace('{lon}', String(lon));
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('forecast http '+res.status);
      return res.json();
    }

    // FIXED: no stray parenthesis. Single, valid definition.
    async function resolveLocationAndLoad() {
      statusEl.text('Resolving location…');
      let coords = null;

      if (navigator.geolocation) {
        try {
          coords = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(
              p => resolve({ lat: p.coords.latitude, lon: p.coords.longitude, name: 'Current location' }),
              err => reject(err),
              { enableHighAccuracy: false, timeout: 6000, maximumAge: 300000 }
            );
          });
        } catch(e) { /* ignore */ }
      }

      if (!coords) {
        const params = new URLSearchParams(location.search);
        const q = params.get('q');
        if (q) coords = await geocodeByName(q);
      }

      if (!coords) coords = await geocodeByName('Minxiong');
      if (!coords) { statusEl.text('Location error'); return; }

      lastCoordsName = coords.name || 'Location';
      placeEl.text(lastCoordsName);

      statusEl.text('Loading weather for ' + lastCoordsName + '…');
      try {
        const data = await fetchForecast(coords.lat, coords.lon);
        const c = data.current || {};
        const t = Number.isFinite(c.temperature_2m) ? Math.round(c.temperature_2m) : null;
        const wind = Number.isFinite(c.wind_speed_10m) ? c.wind_speed_10m : 0;
        const code = c.weather_code;

        if (t !== null) $('#temp').html(String(t) + '<span>°C</span>');
        const d = new Date();
        dateEl.text(d.toLocaleDateString(undefined, { weekday:'long', day:'2-digit', month:'short' }));

        const theme = mapWMOToTheme(code, wind);
        applyTheme(themeToObject(theme));

        const desc = describeCode(code);
        summary.text((desc ? desc + ' • ' : '') + 'Wind ' + wind.toFixed(1) + ' m/s');
        statusEl.text('OK');

        renderDetails(data, lastCoordsName);
      } catch(e) {
        console.warn(e); statusEl.text('Weather load error');
      }
    }

    function describeCode(code){
      const map = {
        0: 'Clear', 1: 'Mainly clear', 2: 'Partly cloudy', 3: 'Overcast',
        45: 'Fog', 48: 'Rime fog',
        51: 'Light drizzle', 53: 'Moderate drizzle', 55: 'Dense drizzle',
        56: 'Freezing drizzle', 57: 'Freezing drizzle',
        61: 'Light rain', 63: 'Moderate rain', 65: 'Heavy rain',
        66: 'Freezing rain', 67: 'Heavy freezing rain',
        71: 'Light snow', 73: 'Moderate snow', 75: 'Heavy snow', 77: 'Snow grains',
        80: 'Rain showers', 81: 'Moderate rain showers', 82: 'Violent rain showers',
        85: 'Snow showers', 86: 'Heavy snow showers',
        95: 'Thunderstorm', 96: 'Thunderstorm w/ hail', 99: 'Thunderstorm w/ heavy hail'
      };
      return map[code] || 'Weather';
    }

    function isoToLocalHour(iso){ try{ const d=new Date(iso); return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});}catch(e){return iso;}}
    function nowIndex(times){ const now=Date.now(); let best=0; let bestDiff=Infinity; for(let i=0;i<times.length;i++){ const t=Date.parse(times[i]); const diff=Math.abs(now-t); if(diff<bestDiff){ best=i; bestDiff=diff; }} return best; }
    function safeget(a,i){ return (Array.isArray(a) && a.length>i) ? a[i] : null; }

    function renderDetails(data, place){
      const cur = data.current||{}; const hr = data.hourly||{};
      panelPlace.text(place || '—');
      panelDate.text(new Date().toLocaleString());
      const desc = describeCode(cur.weather_code);
      kvCond.text(desc||'—');
      kvTemp.text(Number.isFinite(cur.temperature_2m)? Math.round(cur.temperature_2m)+ ' °C':'—');
      kvWind.text(Number.isFinite(cur.wind_speed_10m)? cur.wind_speed_10m.toFixed(1)+' m/s':'—');

      // humidity from hourly nearest now
      let hum='—';
      if (hr.time && hr.relative_humidity_2m){ const idx = nowIndex(hr.time); const v = safeget(hr.relative_humidity_2m, idx); if (Number.isFinite(v)) hum = Math.round(v)+' %'; }
      kvHum.text(hum);

      // Next 6 hours cards
      hoursEl.empty();
      if (hr.time){ const start = nowIndex(hr.time); for(let j=0;j<6 && start+j<hr.time.length; j++){ const i=start+j; const t = isoToLocalHour(hr.time[i]); const temp = safeget(hr.temperature_2m,i); const wind = safeget(hr.wind_speed_10m,i); const cell = $('<div class="hour"/>'); cell.append('<div class="t">'+t+'</div>'); cell.append('<div>'+(Number.isFinite(temp)? Math.round(temp)+'°C':'—')+'</div>'); cell.append('<div>'+(Number.isFinite(wind)? wind.toFixed(1)+' m/s':'—')+'</div>'); hoursEl.append(cell); } }
    }

    function togglePanel(){ const open = panel.hasClass('open'); panel.toggleClass('open', !open).attr('aria-hidden', open ? 'true':'false'); $('#toggle-details').css('transform', open ? 'rotate(0deg)' : 'rotate(90deg)'); }

    // ===== Wiring and boot =====
    function init(){
      onResize();
      $('#panel-back').on('click', togglePanel); // Add event listener for the back button
      toggleBtn.on('click', togglePanel);
      $(window).on('resize', onResize);

      // nav buttons
      weather.forEach(function(w){ var b = $('#button-'+w.type); b.on('click', function(){ applyTheme(w); }); });

      // draw clouds
      for (var i=0; i<clouds.length; i++){ clouds[i].offset = Math.random() * sizes.card.w; drawCloud(clouds[i], i); }

      TweenMax.set(sunburst.node, { opacity: 0 });
      applyTheme(weather[0]);

      // start loop
      requestAnimationFrame(tick);

      // load realtime
      resolveLocationAndLoad();
    }

    // --- Lightweight runtime tests (console) ---
    (function selfTests(){
      try {
        console.assert(typeof describeCode(0) === 'string', 'describeCode basic');
        var theme = mapWMOToTheme(0, 0);
        console.assert(['sun','wind','rain','snow','thunder'].includes(theme), 'mapWMOToTheme domain');
        console.assert(themeToObject('sun') && themeToObject('sun').type === 'sun', 'themeToObject lookup');
        geocodeByName('Minxiong').then(r => console.log('Geocode test Minxiong:', r)).catch(()=>{});
        console.log('Self-tests passed');
      } catch(e){ console.warn('Self-tests failed', e); }
    })();

    // kick
    init();
  </script>
</body>
</html>
