<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>To You</title>
  <style>
    :root { --smaller: .75; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; margin: 0; }
    body {
      align-items: center;
      background: transparent;
      display: flex;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    }
    .container {margin: 0 auto; text-align: center; }
    h1 { font-weight: normal; letter-spacing: .125rem; text-transform: uppercase; }
    li { display: inline-block; font-size: 1.5em; list-style-type: none; padding: 1em; text-transform: uppercase; }
    li span { display: block; font-size: 4.5rem; }
    .emoji { display: none; padding: 1rem; }
    .emoji span { font-size: 4rem; padding: 0 .5rem; }
    @media all and (max-width: 768px) {
      h1 { font-size: calc(1.5rem * var(--smaller)); }
      li { font-size: calc(1.125rem * var(--smaller)); }
      li span { font-size: calc(3.375rem * var(--smaller)); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="headline">Countdown to see you!</h1>
    <div id="countdown">
      <ul>
        <li><span id="days"></span>days</li>
        <li><span id="hours"></span>Hours</li>
        <li><span id="minutes"></span>Minutes</li>
        <li><span id="seconds"></span>Seconds</li>
      </ul>
    </div>
    <div id="content" class="emoji">
      <span>🥳</span>
      <span>🎉</span>
      <span>🎉</span>
    </div>
  </div>

  <script>
    (function () {
      const second = 1000,
            minute = second * 60,
            hour = minute * 60,
            day = hour * 24;

      // Cấu hình ngày sinh: chỉnh MM/DD/
      let today = new Date(),
          dd = String(today.getDate()).padStart(2, "0"),
          mm = String(today.getMonth() + 1).padStart(2, "0"),
          yyyy = today.getFullYear(),
          nextYear = yyyy + 1,
          dayMonth = "01/10/",   // <-- đổi thành ngày/tháng của bạn (MM/DD/)
          birthday = dayMonth + yyyy;

      const todayStr = mm + "/" + dd + "/" + yyyy;
      if (todayStr > birthday) birthday = dayMonth + nextYear;

      const countDown = new Date(birthday).getTime();
      const timer = setInterval(function () {
        const now = new Date().getTime();
        const distance = countDown - now;

        document.getElementById("days").innerText    = Math.floor(distance / day);
        document.getElementById("hours").innerText   = Math.floor((distance % day) / hour);
        document.getElementById("minutes").innerText = Math.floor((distance % hour) / minute);
        document.getElementById("seconds").innerText = Math.floor((distance % minute) / second);

        if (distance < 0) {
          document.getElementById("headline").innerText = "It's the day!";
          document.getElementById("countdown").style.display = "none";
          document.getElementById("content").style.display = "block";
          clearInterval(timer);
        }
      }, 1000); // cập nhật mỗi giây
    }());
  </script>
</body>
</html>
